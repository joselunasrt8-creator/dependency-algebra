name: Package validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install wheel and smoke test
        run: |
          python -m venv /tmp/synapse-package-test
          . /tmp/synapse-package-test/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          synapse --help
          synapse compile --input fixtures/basic.json --output /tmp/synapse-artifact.json
          python -c "import dependency_algebra; print(dependency_algebra.__version__)"

      - name: Run tests
        run: python -m unittest discover -s tests -p '*_tests.py'
